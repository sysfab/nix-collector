name: Flatpak Release

on: 
  workflow_dispatch:
  push:
    paths:
      - 'flake.nix'
      - 'sysfab.nix.collector.json'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-44
      options: --privileged

    steps:
      - uses: actions/checkout@v3
      - name: Generate release tag
        id: tag
        run: |
          echo "::set-output name=release_tag::$(grep -oE 'version = "[^"]+"' flake.nix | head -n1 | cut -d '"' -f2)"
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: collector-${{ steps.tag.outputs.release_tag }}-x86_64.flatpak
          manifest-path: sysfab.nix.collector.json
      - name: Publish release package
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: collector-${{ steps.tag.outputs.release_tag }}-x86_64.flatpak
